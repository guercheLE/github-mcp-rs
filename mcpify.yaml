language: rust
output: .
force: true
publish_registry: true
publication:
  license: MIT
  repository: https://github.com/guercheLE/github-mcp-rs
  readme: README.md
  authors: ["Luciano Evaristo Guerche (Gorše)"]
  keywords: [mcp, github, cli, api]
  categories: [command-line-utilities, api-bindings]
  exclude: [/.github, /.mcpify, /docs, /scripts, /openapi, /Dockerfile, /docker-compose.yml, /.dockerignore, /.env.example, /mcpify.yaml]
default_headers:
  Accept: application/vnd.github+json
auth:
  - name: GitHubBearerToken
    kind: pat
  - name: GitHubTokenHeader
    kind: api-key
    location: header
    parameter_name: Authorization
  - name: GitHubBasicAuth
    kind: basic
versions:
  - version: gh-2026-03-10
    source: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/api.github.com/api.github.com.2026-03-10.yaml
    default: true
  - version: ghec-2026-03-10
    source: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/ghec/ghec.2026-03-10.yaml
  - version: ghes-3.21
    source: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/ghes-3.21/ghes-3.21.yaml
  - version: ghes-3.20
    source: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/ghes-3.20/ghes-3.20.yaml
  - version: ghes-3.19
    source: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/ghes-3.19/ghes-3.19.yaml
version_policy:
  mode: all
package_size_limit_mb: 100
